<div class="dashboard-panel">

    <span class="pulse-dot"></span>
    <h3>FEED LIVE DETECȚII</h3>
    <span class="count-badge">4 TOTAL</span>
  </div>

  <div class="feed-container">
    @for (item of hazardFeed; track item.id){
      <div class="content">
        <div class="meta">
          <span class="id">Risc #{{ item.id }}</span>
          <span class="time">{{ item.time }}</span>
        </div>
        <div class="desc">{{ item.description }}</div>
      </div>
    }
  </div>
</div>
